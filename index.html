<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>happy birthday.</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;1,400;1,600&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050203; 
            color: #e5e5e5;
            font-family: 'Inter', sans-serif;
        }

        .font-serif-aesthetic { font-family: 'Playfair Display', serif; }

        .scene {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.5s ease-in-out, visibility 1.5s;
            z-index: 10;
        }
        .scene.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .btn-minimalist {
            margin-top: 2rem;
            padding: 12px 28px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            backdrop-filter: blur(8px);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-minimalist:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 182, 193, 0.8); 
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 182, 193, 0.1);
        }

        /* Container Galeri Polaroid */
        .gallery-container {
            position: relative;
            width: 100%;
            height: 70vh; /* Lebih tinggi untuk HP agar tidak bertabrakan */
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1rem;
        }

        .polaroid {
            position: absolute;
            background: #fcfcfc;
            padding: 10px 10px 30px 10px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9);
            border-radius: 2px;
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform: scale(0) rotate(0deg) translateY(50px);
            width: 38vw; 
            max-width: 200px;
            min-width: 100px;
        }
        .polaroid img {
            width: 100%;
            height: auto;
            aspect-ratio: 3/4;
            object-fit: cover;
            filter: grayscale(15%) contrast(105%); 
            transition: filter 0.5s;
        }
        .polaroid.show {
            transform: scale(1) rotate(var(--rot)) translateY(0);
        }
        .polaroid:hover {
            transform: scale(1.15) rotate(0deg) !important;
            z-index: 50 !important;
            box-shadow: 0 25px 50px rgba(0,0,0,1);
            cursor: pointer;
        }
        .polaroid:hover img {
            filter: grayscale(0%) contrast(100%);
        }

        /* --- PENGATURAN POSISI FOTO (RESPONSIVE) --- */
        /* LAYOUT MOBILE (2 Atas, 1 Tengah, 2 Bawah) */
        .p-1 { left: 4%; top: 5%; --rot: -8deg; z-index: 2; }
        .p-2 { right: 4%; top: 8%; --rot: 6deg; z-index: 1; }
        .p-3 { left: 0; right: 0; margin-inline: auto; top: 35%; --rot: -2deg; z-index: 5; }
        .p-4 { left: 6%; top: 65%; --rot: 10deg; z-index: 4; }
        .p-5 { right: 6%; top: 62%; --rot: -6deg; z-index: 3; }

        /* LAYOUT DESKTOP/LAPTOP (Berjejer Memanjang) */
        @media (min-width: 768px) {
            .gallery-container { height: 55vh; }
            .p-1 { left: 4%; top: 10%; --rot: -10deg; right: auto; margin: 0; }
            .p-2 { left: 22%; top: 25%; --rot: 8deg; right: auto; margin: 0; }
            .p-3 { left: 0; right: 0; margin-inline: auto; top: 15%; --rot: -2deg; z-index: 5; }
            .p-4 { left: auto; right: 22%; top: 22%; --rot: 6deg; margin: 0; }
            .p-5 { left: auto; right: 4%; top: 12%; --rot: -8deg; margin: 0; }
        }

        /* Heart Collage (Scene 3) */
        .clip-heart {
            clip-path: url(#heartClip);
            -webkit-clip-path: url(#heartClip);
            background-color: rgba(255, 182, 193, 0.1);
        }
        .heart-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 4px;
            width: 100%;
            height: 100%;
        }
        .heart-grid img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.85;
            transition: opacity 0.5s, transform 0.5s;
        }
        .heart-grid img:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
            transition: opacity 1.5s ease-in-out; 
        }
        
        .glow-text { text-shadow: 0 0 15px rgba(255, 182, 193, 0.4); } 

        .floating-subtle { animation: float 4s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        #flash-overlay {
            position: fixed;
            inset: 0;
            background-color: #ffffff; 
            z-index: 45;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.2s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- SVG Clip Path untuk bentuk Love -->
    <svg width="0" height="0" style="position: absolute;">
        <defs>
            <clipPath id="heartClip" clipPathUnits="objectBoundingBox">
                <path d="M 0.5,0.95 C 0.5,0.95 0,0.6 0,0.3 C 0,0.05 0.3,0.0 0.5,0.25 C 0.7,0.0 1,0.05 1,0.3 C 1,0.6 0.5,0.95 0.5,0.95 Z" />
            </clipPath>
        </defs>
    </svg>

    <!-- BACKSOUND AUDIO -->
    <audio id="bg-music" loop>
      <source src="bs_hbd.mp3.mpeg" type="audio/mpeg">
    </audio>

    <!-- Canvas 2D untuk Bunga Mont Hua -->
    <canvas id="flower-canvas"></canvas>
    
    <div id="flash-overlay"></div>

    <!-- SCENE 0: Intro -->
    <div id="scene0" class="scene active bg-[#050203] z-50 text-center px-6">
        <p class="text-lg md:text-xl font-light text-gray-300 tracking-[0.2em] opacity-0 animate-[fadeIn_2s_ease-in_forwards]">
            hi, queenzy.
        </p>
        <button class="btn-minimalist opacity-0 animate-[fadeIn_2s_ease-in_1.5s_forwards]" onclick="startExperience()">
            open
        </button>
    </div>

    <!-- SCENE 1: Bunga Mekar Tahap 1 -->
    <div id="scene1" class="scene z-40 text-center px-6 pointer-events-none bg-transparent">
        <div class="absolute top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-lg">
            <h2 id="text-scene1" class="text-xl md:text-2xl font-serif-aesthetic italic text-gray-100 transition-opacity duration-1000 leading-relaxed glow-text opacity-0">
                made a little something for u.
            </h2>
        </div>
        
        <button id="btn-engulf" class="btn-minimalist absolute bottom-16 md:bottom-20 pointer-events-auto opacity-0 transition-opacity duration-1000 z-[60]" onclick="triggerEngulf()">
            next
        </button>
    </div>

    <!-- SCENE 2: Galeri Polaroid -->
    <div id="scene2" class="scene z-40 bg-[radial-gradient(ellipse_at_center,_rgba(255,182,193,0.15)_0%,_rgba(0,0,0,0.8)_100%)] backdrop-blur-sm px-4 pointer-events-none">
        
        <!-- Ornamen Latar Belakang -->
        <div class="absolute inset-0 pointer-events-none opacity-60 z-0">
            <svg class="absolute top-[20%] left-[8%] w-6 h-6 text-pink-200 animate-pulse" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C12 6.6 17.4 12 24 12C17.4 12 12 17.4 12 24C12 17.4 6.6 12 0 12C6.6 12 12 6.6 12 0Z"/></svg>
            <svg class="absolute top-[18%] right-[15%] w-8 h-8 text-pink-300/40 animate-[pulse_3s_infinite]" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            <svg class="absolute top-[50%] left-[5%] w-4 h-4 text-pink-100 animate-[pulse_2s_infinite]" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C12 6.6 17.4 12 24 12C17.4 12 12 17.4 12 24C12 17.4 6.6 12 0 12C6.6 12 12 6.6 12 0Z"/></svg>
            <svg class="absolute bottom-[35%] left-[15%] w-6 h-6 text-pink-400/30 animate-bounce" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            <svg class="absolute bottom-[30%] right-[10%] w-7 h-7 text-pink-200 animate-pulse" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C12 6.6 17.4 12 24 12C17.4 12 12 17.4 12 24C12 17.4 6.6 12 0 12C6.6 12 12 6.6 12 0Z"/></svg>
        </div>

        <div class="absolute top-8 md:top-16 w-full text-center z-10">
            <h2 class="text-2xl md:text-4xl font-serif-aesthetic italic text-white glow-text mt-4">
                hiiiiiii.
            </h2>
            <div class="w-32 h-[1px] bg-gradient-to-r from-transparent via-pink-300 to-transparent mx-auto mt-4 opacity-70"></div>
        </div>
        
        <!-- GALERI DENGAN CLASS CSS BARU -->
        <div class="gallery-container z-10" id="gallery">
            <div class="polaroid p-1">
                <img src="Screenshot_66.jpg" alt="Foto 1">
            </div>
            <div class="polaroid p-2">
                <img src="Screenshot_61.jpg" alt="Foto 2">
            </div>
            <div class="polaroid p-3">
                <img src="Screenshot_62.jpg" alt="Foto 3">
            </div>
            <div class="polaroid p-4">
                <img src="Screenshot_60.jpg" alt="Foto 4">
            </div>
            <div class="polaroid p-5">
                <img src="Screenshot_65.jpg" alt="Foto 5">
            </div>
        </div>

        <button class="btn-minimalist absolute bottom-8 md:bottom-12 z-[60] pointer-events-auto shadow-[0_0_20px_rgba(0,0,0,0.8)]" onclick="showHeartGallery()">
            next
        </button>
    </div>

    <!-- SCENE 3: Kolase Bentuk Love -->
    <div id="scene3" class="scene z-40 bg-[radial-gradient(ellipse_at_center,_rgba(255,182,193,0.2)_0%,_rgba(0,0,0,0.9)_100%)] backdrop-blur-md px-4 pointer-events-none flex flex-col items-center justify-center">
        
        <h2 class="text-xl md:text-3xl font-serif-aesthetic italic text-white glow-text mb-8 md:mb-12 z-10">
            all of these, in my heart.
        </h2>
        <div class="w-24 h-[1px] bg-gradient-to-r from-transparent via-pink-300 to-transparent mx-auto mb-6 opacity-70 absolute top-[28%]"></div>

        <div class="clip-heart w-[85vw] h-[85vw] max-w-[400px] max-h-[400px] pointer-events-auto shadow-[0_0_50px_rgba(255,182,193,0.3)] z-10">
            <div class="heart-grid">
                <img src="Screenshot_60.jpg" alt="1">
                <img src="Screenshot_61.jpg" alt="2">
                <img src="Screenshot_62.jpg" alt="3">
                <img src="Screenshot_63.jpg" alt="4">
                <img src="Screenshot_65.jpg" alt="5">
                <img src="Screenshot_60.jpg" alt="6">
                <img src="Screenshot_61.jpg" alt="7">
                <img src="Screenshot_62.jpg" alt="8">

            one more thing

    <!-- SCENE 4: Pesan Akhir (Finale) -->
    <div id="scene4" class="scene z-50 bg-black/70 backdrop-blur-md text-center px-6 pointer-events-none">
        <div class="floating-subtle mb-8">
            <p class="text-xs md:text-sm tracking-[0.4em] text-pink-300 uppercase mb-4">happy level up day</p>
            <h1 class="text-6xl md:text-8xl font-serif-aesthetic italic text-white glow-text">
                queenzy.
            </h1>
        </div>
        
        <div class="p-6 md:p-8 rounded-xl bg-white/5 border border-pink-200/20 backdrop-blur-lg max-w-lg mx-auto w-full shadow-[0_0_30px_rgba(255,182,193,0.1)] pointer-events-auto">
            <p id="typewriter-text" class="text-gray-200 text-sm md:text-base font-light leading-relaxed min-h-[140px] md:min-h-[120px] text-left">
            </p>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. LOGIKA UI & STATE TRANSAKSI SCENE
        // ==========================================
        const bgMusic = document.getElementById('bg-music');
        let isFinale = false;

        const finalMessage = "thanks for existing and being the best part of my days.\n\nwishing u the absolute best today and always. let's make more memories together. pls take care of yourself, ok?\n\nwith love. 🤍";
        let typeIndex = 0;

        function typeWriter() {
            if (typeIndex < finalMessage.length) {
                const char = finalMessage.charAt(typeIndex);
                if (char === '\n') {
                    document.getElementById('typewriter-text').innerHTML += '<br>';
                } else {
                    document.getElementById('typewriter-text').innerHTML += char;
                }
                typeIndex++;
                setTimeout(typeWriter, 40); 
            } else {
                const currentText = document.getElementById('typewriter-text').innerHTML;
                document.getElementById('typewriter-text').innerHTML = currentText.replace('with love. 🤍', '<span class="text-pink-300 font-serif-aesthetic italic text-xl glow-text">with love. 🤍</span>');
            }
        }

        function startExperience() {
            document.getElementById('scene0').classList.remove('active');
            document.getElementById('scene1').classList.add('active');
            
            bgMusic.play().catch(e => console.log("Audio play failed"));
            
            setFlowerTarget(0.4, 1.2); 
            
            setTimeout(() => {
                const txt = document.getElementById('text-scene1');
                txt.innerText = "hope this makes u smile.";
                txt.style.opacity = 1;
                
                setTimeout(() => {
                    document.getElementById('btn-engulf').style.opacity = 1;
                }, 1000);
            }, 2500);
        }

        function triggerEngulf() {
            document.getElementById('text-scene1').style.opacity = 0;
            document.getElementById('btn-engulf').style.opacity = 0;
            document.getElementById('btn-engulf').style.pointerEvents = 'none';
            
            setFlowerTarget(0.6, 1.5);

            setTimeout(() => {
                document.getElementById('flash-overlay').style.opacity = 1;
                
                setTimeout(() => {
                    document.getElementById('scene1').classList.remove('active');
                    document.getElementById('scene2').classList.add('active');
                    
                    document.getElementById('flash-overlay').style.opacity = 0;

                    const polaroids = document.querySelectorAll('.polaroid');
                    polaroids.forEach((el, index) => {
                        setTimeout(() => el.classList.add('show'), index * 300); 
                    });
                }, 1000); 
            }, 1000); 
        }

        function showHeartGallery() {
            document.getElementById('scene2').classList.remove('active');
            document.getElementById('scene3').classList.add('active');
            
            setFlowerTarget(0.8, 1.8);
        }

        function showFinale() {
            document.getElementById('scene3').classList.remove('active');
            document.getElementById('scene4').classList.add('active');
            
            setFlowerTarget(1.0, 2.0);
            isFinale = true;
            initFallingPetals();

            setTimeout(typeWriter, 1000);
        }

        // ==========================================
        // 2. LOGIKA CANVAS 2D PURE BLOSSOM
        // ==========================================
        const canvas = document.getElementById('flower-canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height, centerX, centerY;
        let baseScreenScale = 1; // FIX: Variabel untuk mencegah bunga hilang/mengecil di HP
        
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            
            const dpr = window.devicePixelRatio || 1;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            
            ctx.scale(dpr, dpr);
            centerX = width / 2;
            centerY = height / 2;

            // FIX: Mengukur proporsi layar agar ukuran bunga konsisten di Desktop & HP
            baseScreenScale = Math.min(width, height) / 700;
            if(baseScreenScale < 0.45) baseScreenScale = 0.45; // Batas minimum agar tak pernah jadi "titik"
        }
        window.addEventListener('resize', resize);
        resize();

        // State Bunga Utama
        let currentBloom = 0.05; 
        let targetBloom = 0.05;
        let currentScale = 0.8;
        let targetScale = 0.8;
        
        function setFlowerTarget(bloom, scale) {
            targetBloom = bloom;
            targetScale = scale;
        }

        // Kumpulan Bunga (1 Utama, 4 Kecil di sekelilingnya)
        const flowersData = [
            { xOffset: 0, yOffset: 0, scaleMult: 1.0, rot: 0, delay: 0, isMain: true },
            { xOffset: -0.28, yOffset: -0.32, scaleMult: 0.45, rot: 1.2, delay: 0.2, isMain: false },
            { xOffset: 0.35, yOffset: -0.25, scaleMult: 0.55, rot: -0.8, delay: 0.1, isMain: false },
            { xOffset: -0.32, yOffset: 0.35, scaleMult: 0.4, rot: 0.5, delay: 0.3, isMain: false },
            { xOffset: 0.28, yOffset: 0.38, scaleMult: 0.5, rot: -1.2, delay: 0.15, isMain: false }
        ];

        // --- EFEK STARDUST & BINTANG KILAU ---
        const stardust = [];
        for(let i = 0; i < 80; i++) {
            stardust.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                radius: Math.random() * 1.5 + 0.5,
                vx: (Math.random() - 0.5) * 0.3,
                vy: -Math.random() * 0.5 - 0.1,
                alpha: Math.random() * 0.5 + 0.1,
                isStar: Math.random() > 0.85 
            });
        }

        function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius, color) {
            let rot = Math.PI / 2 * 3;
            let x = cx;
            let y = cy;
            let step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;

                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
        }

        function drawStardust(ctx) {
            stardust.forEach(p => {
                const color = `rgba(255, 182, 193, ${p.alpha})`;
                
                if (p.isStar) {
                    drawStar(ctx, p.x, p.y, 4, p.radius * 3, p.radius * 0.8, color);
                } else {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = color;
                    ctx.fill();
                }

                p.x += p.vx;
                p.y += p.vy;

                if (p.y < -10) p.y = height + 10;
                if (p.x < -10) p.x = width + 10;
                if (p.x > width + 10) p.x = -10;
            });
        }

        // Menggambar 1 Kelopak Bunga
        function drawPetal(ctx, angle, spread, sizeScale) {
            ctx.save();
            ctx.rotate(angle);
            
            const openWidthScale = 0.3 + spread * 0.7; 
            const pushOut = spread * 15 * sizeScale; 
            const length = 85 * sizeScale;

            ctx.translate(0, -pushOut);
            ctx.scale(openWidthScale * sizeScale, sizeScale);

            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-35, -20, -45, -length + 10, 0, -length);
            ctx.bezierCurveTo(45, -length + 10, 35, -20, 0, 0);

            const grad = ctx.createLinearGradient(0, 0, 0, -length);
            grad.addColorStop(0, '#cc1f5a');     
            grad.addColorStop(0.3, '#ff6b99');   
            grad.addColorStop(0.7, '#ffb3cc');   
            grad.addColorStop(1, '#fff0f5');     

            ctx.fillStyle = grad;
            ctx.fill();

            ctx.strokeStyle = 'rgba(204, 31, 90, 0.25)';
            ctx.lineWidth = 1;
            for (let i = -1; i <= 1; i += 2) {
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(i * 12, -length * 0.4, i * 4, -length * 0.8);
                ctx.stroke();
            }

            ctx.restore();
        }

        // Menggambar Benang Sari 
        function drawStamens(ctx, bloom, sizeScale) {
            if (bloom <= 0) return;
            ctx.save();
            ctx.scale(sizeScale, sizeScale);
            
            const numStamens = 30;
            for(let i = 0; i < numStamens; i++) {
                const angle = (i / numStamens) * Math.PI * 2;
                const length = 35 * bloom * (0.7 + Math.random() * 0.4);
                
                ctx.save();
                ctx.rotate(angle);
                
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(3, -length / 2, 0, -length);
                ctx.strokeStyle = `rgba(230, 74, 121, ${bloom})`;
                ctx.lineWidth = 0.8;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(0, -length, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 215, 0, ${bloom * 0.8})`; 
                ctx.fill();
                
                ctx.restore();
            }
            ctx.restore();
        }

        // Menggambar Ranting Bunga
        function drawBranch(ctx, scale, isMain) {
            ctx.save();
            ctx.scale(scale, scale);
            ctx.strokeStyle = 'rgba(42, 27, 32, 0.4)'; 
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            if(isMain) {
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.moveTo(-300, 250);
                ctx.quadraticCurveTo(-150, 100, 0, 0); 
                ctx.stroke();

                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(-180, 120);
                ctx.quadraticCurveTo(-100, -20, 50, -80);
                ctx.stroke();
            } else {
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(-80, 80);
                ctx.quadraticCurveTo(-30, 20, 0, 0); 
                ctx.stroke();
            }

            ctx.restore();
        }

        // Menggambar Bunga Lengkap
        function drawFlower(ctx, x, y, bloom, scale, rotOffset, isMain) {
            ctx.save();
            ctx.translate(x, y);

            drawBranch(ctx, scale, isMain);

            const time = Date.now() * 0.0002;
            ctx.rotate(time + rotOffset);

            const layers = 3;
            for(let l = 0; l < layers; l++) {
                const numPetals = 5;
                const layerScaleScale = 1 - (l * 0.15); 
                const layerRotationOffset = (l * Math.PI) / numPetals + (time * l * 0.5);

                for(let i = 0; i < numPetals; i++) {
                    const angle = (i / numPetals) * Math.PI * 2 + layerRotationOffset;
                    const layerBloom = Math.max(0, Math.min(1, bloom * 1.5 - l * 0.2));
                    const breath = Math.sin(Date.now() * 0.001 + i) * 0.02;
                    
                    drawPetal(ctx, angle, layerBloom + breath, scale * layerScaleScale);
                }
            }

            const stamenBloom = Math.max(0, (bloom - 0.2) / 0.8);
            drawStamens(ctx, stamenBloom, scale);

            ctx.restore();
        }

        // ==========================================
        // 3. PARTIKEL KELOPAK GUGUR
        // ==========================================
        const fallingPetals = [];
        function initFallingPetals() {
            for(let i = 0; i < 60; i++) {
                fallingPetals.push({
                    x: Math.random() * width,
                    y: Math.random() * height - height,
                    speedY: 1 + Math.random() * 2,
                    speedX: -1 + Math.random() * 2,
                    scale: 0.2 + Math.random() * 0.4,
                    rotation: Math.random() * Math.PI * 2,
                    rotationSpeed: (Math.random() - 0.5) * 0.05
                });
            }
        }

        function drawFallingPetals(ctx) {
            if (!isFinale) return;
            
            fallingPetals.forEach(p => {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation);
                
                ctx.scale(p.scale, p.scale);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-15, -10, -20, -30, 0, -40);
                ctx.bezierCurveTo(20, -30, 15, -10, 0, 0);
                ctx.fillStyle = '#ffb3cc';
                ctx.fill();
                ctx.restore();

                p.y += p.speedY;
                p.x += Math.sin(p.y * 0.01) + p.speedX; 
                p.rotation += p.rotationSpeed;

                if (p.y > height + 50) {
                    p.y = -50;
                    p.x = Math.random() * width;
                }
            });
        }

        // ==========================================
        // 4. ANIMATION LOOP UTAMA
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            currentBloom += (targetBloom - currentBloom) * 0.03;
            currentScale += (targetScale - currentScale) * 0.03;

            drawStardust(ctx);
            
            // Loop untuk menggambar banyak bunga
            flowersData.forEach(f => {
                // Kalkulasi delay mekarnya bunga kecil
                let fBloom = Math.max(0, currentBloom - f.delay);
                if (fBloom > 1) fBloom = 1;
                
                // Gunakan baseScreenScale agar tidak jadi titik di HP
                let finalScale = currentScale * f.scaleMult * baseScreenScale;
                
                let posX = centerX + (f.xOffset * width);
                let posY = centerY + (f.yOffset * height);
                
                drawFlower(ctx, posX, posY, fBloom, finalScale, f.rot, f.isMain);
            });

            drawFallingPetals(ctx);
        }

        animate();
    </script>
